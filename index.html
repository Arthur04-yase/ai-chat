<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张三的聊天机器</title>
    <style>
        /* ==================== 全局样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* ==================== 聊天容器 ==================== */
        .chat-container {
            width: 420px;
            height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ==================== 顶部标题栏 ==================== */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 4px;
        }

        /* 顶部按钮组 */
        .header-buttons {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 6px;
        }

        .header-buttons button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-buttons button:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.1);
        }

        /* ==================== 消息列表区域 ==================== */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;          /* 消息多了自动滚动 */
            background: #f5f6fa;
        }

        /* 滚动条美化 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        /* ==================== 消息气泡 - 通用 ==================== */
        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;   /* 出现动画 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 头像 */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .avatar.ai {
            background: #667eea;
            margin-right: 10px;
        }

        .avatar.user {
            background: #2ecc71;
            margin-left: 10px;
            order: 1;
        }

        /* ==================== 消息气泡 - AI ==================== */
        .message.ai {
            justify-content: flex-start;  /* AI 消息靠左 */
        }

        .message.ai .bubble {
            background: white;
            color: #333;
            border-radius: 0 16px 16px 16px;
            padding: 12px 16px;
            max-width: 75%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;        /* 保留换行 */
        }

        /* ==================== 消息气泡 - 用户 ==================== */
        .message.user {
            justify-content: flex-end;    /* 用户消息靠右 */
        }

        .message.user .bubble {
            background: #667eea;
            color: white;
            border-radius: 16px 0 16px 16px;
            padding: 12px 16px;
            max-width: 75%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            line-height: 1.6;
            font-size: 14px;
        }

        /* ==================== 时间戳 ==================== */
        .time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        /* ==================== "正在输入"动画 ==================== */
        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 0 16px 16px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            max-width: 75%;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 3px;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); background: #ccc; }
            40% { transform: scale(1); background: #667eea; }
        }

        /* ==================== 底部输入框 ==================== */
        .chat-input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .chat-input-area input:focus {
            border-color: #667eea;
        }

        .chat-input-area button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ==================== 深色模式 ==================== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode .chat-container {
            background: #1e1e2e;
        }

        body.dark-mode .chat-messages {
            background: #1a1a2e;
        }

        body.dark-mode .message.ai .bubble {
            background: #2d2d44;
            color: #e0e0e0;
        }

        body.dark-mode .message.user .bubble {
            background: #4a4a8a;
        }

        body.dark-mode .typing-indicator {
            background: #2d2d44;
        }

        body.dark-mode .chat-input-area {
            background: #1e1e2e;
            border-top-color: #333;
        }

        body.dark-mode .chat-input-area input {
            background: #2d2d44;
            border-color: #444;
            color: #e0e0e0;
        }

        body.dark-mode .chat-input-area input::placeholder {
            color: #888;
        }

        body.dark-mode .chat-input-area input:focus {
            border-color: #667eea;
        }

        body.dark-mode .chat-footer {
            background: #1e1e2e;
            color: #555;
        }

        body.dark-mode .time {
            color: #666;
        }

        /* ==================== API Key 配置弹窗 ==================== */
        .config-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .config-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .config-box h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #333;
        }

        .config-box .desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .config-box label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .config-box input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
        }

        .config-box input:focus {
            border-color: #667eea;
        }

        .config-box .btn-confirm {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .config-box .btn-confirm:hover {
            opacity: 0.9;
        }

        .config-box .hint {
            margin-top: 12px;
            font-size: 12px;
            color: #999;
            line-height: 1.5;
        }

        .config-box .hint a {
            color: #667eea;
        }

        .btn-demo {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #667eea;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-demo:hover {
            background: #f0f2ff;
        }

        /* ==================== 底部信息 ==================== */
        .chat-footer {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: #bbb;
            background: white;
        }

        /* ==================== 移动端适配 ==================== */
        @media (max-width: 480px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== API Key 配置弹窗 ==================== -->
    <div class="config-overlay" id="configOverlay">
        <div class="config-box">
            <h2>🔑 配置 API Key</h2>
            <p class="desc">需要 API Key 才能跟 AI 聊天。推荐用 DeepSeek，注册送额度。</p>

            <label for="apiKeyInput">API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-..." />

            <label for="apiUrlInput">API 地址（可选）</label>
            <input type="text" id="apiUrlInput" placeholder="https://api.deepseek.com/v1/chat/completions" />

            <button class="btn-confirm" onclick="saveConfig()">开始聊天</button>

            <button class="btn-demo" onclick="enterDemoMode()">🎮 演示模式（不用 Key）</button>

            <div id="configModeHint" class="hint" style="display:none;">
                当前模式：<span id="currentModeText">演示模式</span><br>
                <a href="#" onclick="clearAndExit()" style="color:#e74c3c;">退出演示模式并重新配置</a>
            </div>

            <div class="hint">
                💡 没有 Key？先点"演示模式"体验，<br>
                或去 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 注册免费获取
            </div>
        </div>
    </div>

    <!-- ==================== 聊天界面 ==================== -->
    <div class="chat-container">
        <!-- 标题栏 -->
        <div class="chat-header">
            <h1>🤖 AI 智能聊天助手</h1>
            <p>基于 DeepSeek / OpenAI 接口</p>
            <div class="header-buttons">
                <button onclick="openConfig()" title="设置">⚙️</button>
                <button onclick="clearChat()" title="清空对话">🗑️</button>
                <button onclick="toggleDarkMode()" title="切换深色模式">🌙</button>
            </div>
        </div>

        <!-- 消息列表 -->
        <div class="chat-messages" id="chatMessages">
            <!-- 欢迎消息 -->
            <div class="message ai">
                <div class="avatar ai">🤖</div>
                <div>
                    <div class="bubble">你好！我是 AI 助手，有什么可以帮你的吗？</div>
                    <div class="time">刚刚</div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <input
                type="text"
                id="userInput"
                placeholder="输入你的问题..."
                autofocus
                onkeydown="if(event.key==='Enter') sendMessage()"
            />
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>

        <div class="chat-footer">AI 聊天助手 v1.0</div>
    </div>

    <script>
        // ==============================================================
        //  全局变量
        // ==============================================================

        // 每次对话的消息历史，用来传给 AI 接口（让它记住上下文）
        let messageHistory = [
            {
                role: "system",
                content: "你是一个友好的 AI 助手，请用中文简洁地回答用户问题。"
            }
        ];

        // ==============================================================
        //  API Key 配置相关
        // ==============================================================

        /**
         * 打开配置弹窗
         */
        function openConfig() {
            const overlay = document.getElementById("configOverlay");
            const hint = document.getElementById("configModeHint");
            const modeText = document.getElementById("currentModeText");

            // 根据当前模式显示不同提示
            if (isDemoMode) {
                hint.style.display = "block";
                modeText.textContent = "🎮 演示模式";
            } else {
                hint.style.display = "none";
            }

            overlay.style.display = "flex";
        }

        /**
         * 保存用户填写的 API Key 和接口地址
         */
        function saveConfig() {
            const key = document.getElementById("apiKeyInput").value.trim();
            const url = document.getElementById("apiUrlInput").value.trim();

            // 检查 API Key 是否填写
            if (!key) {
                alert("请输入 API Key");
                return;
            }

            // 保存到 localStorage（下次打开不用重新填）
            localStorage.setItem("ai_api_key", key);
            localStorage.setItem("ai_api_url", url || "https://api.deepseek.com/v1/chat/completions");
            localStorage.removeItem("demo_mode");  // 退出演示模式

            // 关闭配置弹窗
            isDemoMode = false;
            document.getElementById("configOverlay").style.display = "none";
            document.getElementById("userInput").focus();
        }

        /**
         * 清除所有配置并退出演示模式
         */
        function clearAndExit() {
            localStorage.removeItem("ai_api_key");
            localStorage.removeItem("ai_api_url");
            localStorage.removeItem("demo_mode");
            isDemoMode = false;
            document.getElementById("configModeHint").style.display = "none";
            document.getElementById("apiKeyInput").value = "";
            document.getElementById("apiUrlInput").value = "";
        }

        // ==============================================================
        //  演示模式（不用 API Key 也能聊）
        // ==============================================================

        let isDemoMode = false;

        /**
         * 进入演示模式
         */
        function enterDemoMode() {
            isDemoMode = true;
            // 保存演示模式状态，刷新后保持
            localStorage.setItem("demo_mode", "true");
            // 如果有 Key 的话不清除，方便以后切换回来
            document.getElementById("configOverlay").style.display = "none";
            document.getElementById("userInput").focus();
            addMessage("ai", "🎮 演示模式已开启！\n\n我现在是模拟的 AI 回复，你可以随便问问题试试效果。\n（想要真 AI 回复，点击标题栏的 ⚙️ 按钮配置 API Key 即可）");
        }

        /**
         * 演示模式下的自动回复（根据关键词匹配）
         */
        function getDemoReply(userText) {
            const text = userText.toLowerCase();

            if (text.includes("你好") || text.includes("嗨") || text.includes("hello")) {
                return "你好！我是张三，这是我的AI聊天项目～😊";
            }
            if (text.includes("项目") || text.includes("工作")) {
                return "这个AI聊天项目是我独立开发的，用了HTML+CSS+JavaScript，支持智能对话！";
            }
            if (text.includes("做什么") || text.includes("功能")) {
                return "我能跟你聊天、回答问题、陪你练习面试！虽然现在是演示版，但接上真AI接口后什么都能聊～";
            }
            if (text.includes("名字") || text.includes("你是谁")) {
                return "我是 AI 智能聊天助手，你可以叫我小艾！有什么问题尽管问我～";
            }
            if (text.includes("天气")) {
                return "今天天气不错哦！☀️ 不过我现在还不能查实时天气，需要接入天气 API。需要我帮你查其他的吗？";
            }
            if (text.includes("代码") || text.includes("编程") || text.includes("python")) {
                return "说到编程，Python 是个很好的入门语言！你想了解哪方面的知识？我可以给你一些建议。";
            }
            if (text.includes("flutter") || text.includes("app") || text.includes("客户端")) {
                return "Flutter 是 Google 的跨平台 UI 框架，一套代码同时跑 Android 和 iOS。学习曲线有点陡，但做出项目后简历上很加分！";
            }
            if (text.includes("简历") || text.includes("面试") || text.includes("工作")) {
                return "做项目是简历上最好的亮点！建议把项目部署上线，面试时直接给面试官看链接，比写一大堆文字有说服力多了 💪";
            }
            if (text.includes("谢谢") || text.includes("感谢")) {
                return "不客气！加油，相信你一定能做出好项目 🚀 有问题随时问我！";
            }

            // 默认回复
            const defaultReplies = [
                "这个问题很有意思！让我想想 🤔\n\n其实关键是要多动手实践，光看理论是不够的。你试过自己写代码试试吗？",
                "好问题！我建议你先拆分一下需求，从最简单的功能开始做起，逐步完善。",
                "嗯，让我理解一下你的问题... 你可以说得更具体一些吗？这样我能给你更有针对性的建议。",
                "这个方向不错！建议你先从小功能入手，做出一个可用版本后再迭代优化。",
                "加油！做项目遇到困难是正常的，重要的是坚持下来。每一步都算数 💪"
            ];
            return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
        }

        /**
         * 页面加载时，恢复之前的配置
         */
        window.onload = function () {
            // 先检查是否在演示模式
            if (localStorage.getItem("demo_mode") === "true") {
                isDemoMode = true;
                document.getElementById("configOverlay").style.display = "none";
            }

            const savedKey = localStorage.getItem("ai_api_key");
            if (savedKey) {
                // 有保存过的 Key，直接关闭配置弹窗
                document.getElementById("apiKeyInput").value = savedKey;

                const savedUrl = localStorage.getItem("ai_api_url");
                if (savedUrl) {
                    document.getElementById("apiUrlInput").value = savedUrl;
                }

                document.getElementById("configOverlay").style.display = "none";
            }
            loadTheme();
        };

        // ==============================================================
        //  发送 / 接收消息
        // ==============================================================

        /**
         * 发送消息（用户点击发送按钮或按回车时触发）
         */
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();

            // 如果输入为空，不做任何事
            if (!text) return;

            // 清空输入框
            input.value = "";

            // 1. 在聊天界面显示用户的消息
            addMessage("user", text);
            // 2. 把用户消息加入历史
            messageHistory.push({ role: "user", content: text });
            // 3. 显示"正在输入..."动画
            showTyping();
            // 4. 禁用发送按钮，防止重复点击
            setSendButtonEnabled(false);

            try {
                // 5. 获取回复（演示模式 或 真实接口）
                let reply;
                if (isDemoMode) {
                    // 演示模式：模拟网络延迟
                    await new Promise(r => setTimeout(r, 800 + Math.random() * 1200));
                    reply = getDemoReply(text);
                } else {
                    reply = await callAI(messageHistory);
                }
                // 6. 移除"正在输入"动画
                hideTyping();
                // 7. 显示 AI 回复
                addMessage("ai", reply);
                // 8. 把 AI 回复加入历史（这样它能记住前面聊了什么）
                messageHistory.push({ role: "assistant", content: reply });

            } catch (err) {
                // 如果出错了（网络问题 / Key无效 / 其他）
                hideTyping();
                addMessage("ai", "😅 出错了：" + err.message + "\n\n请检查 API Key 是否正确，或网络是否通畅。");
            } finally {
                setSendButtonEnabled(true);
                input.focus();
            }
        }

        /**
         * 调用 AI 接口
         * @param {Array} messages - 消息历史
         * @returns {Promise<string>} - AI 回复内容
         */
        async function callAI(messages) {
            const apiKey = localStorage.getItem("ai_api_key");
            const apiUrl = localStorage.getItem("ai_api_url") || "https://api.deepseek.com/v1/chat/completions";

            // 发送请求到 AI 接口
            const response = await fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + apiKey
                },
                body: JSON.stringify({
                    model: "deepseek-chat",     // DeepSeek 模型名
                    messages: messages,
                    temperature: 0.7,           // 0-2，越大回答越随机
                    max_tokens: 2000,           // 最大回复长度
                })
            });

            // 如果接口返回错误（比如 Key 无效、额度不足）
            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `HTTP ${response.status}`);
            }

            // 解析返回结果
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // ==============================================================
        //  UI 操作（显示消息、动画等）
        // ==============================================================

        /**
         * 在聊天界面添加一条消息
         * @param {string} role - "user" 或 "ai"
         * @param {string} content - 消息内容
         */
        function addMessage(role, content) {
            const container = document.getElementById("chatMessages");

            // 创建消息的 HTML 结构
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar ${role}">${role === "ai" ? "🤖" : "😊"}</div>
                <div>
                    <div class="bubble">${formatContent(content)}</div>
                    <div class="time">${getCurrentTime()}</div>
                </div>
            `;

            container.appendChild(div);

            // 滚动到最新消息
            container.scrollTop = container.scrollHeight;
        }

        /**
         * 显示"正在输入..."动画
         */
        function showTyping() {
            const container = document.getElementById("chatMessages");

            const div = document.createElement("div");
            div.className = "message ai";
            div.id = "typingIndicator";
            div.innerHTML = `
                <div class="avatar ai">🤖</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        /**
         * 隐藏"正在输入..."动画
         */
        function hideTyping() {
            const indicator = document.getElementById("typingIndicator");
            if (indicator) indicator.remove();
        }

        /**
         * 启用/禁用发送按钮
         */
        function setSendButtonEnabled(enabled) {
            document.getElementById("sendBtn").disabled = !enabled;
        }

        /**
         * 获取当前时间字符串（如 14:30）
         */
        function getCurrentTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, "0");
            const m = String(now.getMinutes()).padStart(2, "0");
            return h + ":" + m;
        }

        /**
         * 把消息中的换行符转成 <br>，URL 转成链接
         */
        function formatContent(text) {
            let result = text
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");

            // 把 URL 转成可点击的链接
            result = result.replace(
                /(https?:\/\/[^\s<]+)/g,
                '<a href="$1" target="_blank" style="color: #667eea;">$1</a>'
            );

            return result;
        }

        /**
         * 清空对话
         */
        function clearChat() {
            if (!confirm("确定要清空所有对话吗？")) return;

            messageHistory = [
                {
                    role: "system",
                    content: "你是一个友好的 AI 助手，请用中文简洁地回答用户问题。"
                }
            ];

            const container = document.getElementById("chatMessages");
            container.innerHTML = `
                <div class="message ai">
                    <div class="avatar ai">🤖</div>
                    <div>
                        <div class="bubble">你好！我是 AI 助手，有什么可以帮你的吗？</div>
                        <div class="time">刚刚</div>
                    </div>
                </div>
            `;
        }

        /**
         * 切换深色模式
         */
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
            const isDark = document.body.classList.contains("dark-mode");
            localStorage.setItem("dark_mode", isDark);
            const btn = document.querySelector(".header-buttons button:last-child");
            btn.textContent = isDark ? "☀️" : "🌙";
        }

        /**
         * 页面加载时恢复深色模式
         */
        function loadTheme() {
            const isDark = localStorage.getItem("dark_mode") === "true";
            if (isDark) {
                document.body.classList.add("dark-mode");
                const btn = document.querySelector(".header-buttons button:last-child");
                if (btn) btn.textContent = "☀️";
            }
        }
    </script>
</body>
</html>
